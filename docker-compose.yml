services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_ppt_studio}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - ./storage/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - ./storage/redis:/data

  api:
    image: python:3.11-slim
    working_dir: /workspace
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_ppt_studio
      REDIS_URL: redis://redis:6379/0
    command: >
      sh -c "pip install --no-cache-dir -e . && python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --app-dir apps/api/src"
    volumes:
      - ./:/workspace
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  web:
    image: python:3.11-slim
    working_dir: /workspace/apps/web
    env_file:
      - /workspace/.env
    command: python server.py
    volumes:
      - ./:/workspace
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
